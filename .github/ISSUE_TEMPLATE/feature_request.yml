name: Documentation Request
description: Suggest additional documentation or examples
title: "[Request]: "
labels: ["documentation", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting improvements to the SPAN API documentation!

        **Note:** This is for documentation requests only. For feature requests about the SPAN API itself, please use [Discussions](https://github.com/spanio/SPAN-API-Client-Docs/discussions).

  - type: dropdown
    id: type
    attributes:
      label: Request Type
      options:
        - New documentation topic
        - Additional code example
        - Clarification of existing docs
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What documentation would you like to see added or improved?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this documentation help you?
    validations:
      required: false
